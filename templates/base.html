<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}sf-initial-setup-agent{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/app.css') }}?v={{ asset_version }}">
</head>
<body>
    <header class="app-header">
        <div class="container">
            <h1><a href="/">sf-initial-setup-agent</a></h1>
            <nav>
                <a href="/">Wizard</a>
                <a href="/dashboard">Dashboard</a>
                <a href="/summary">Summary</a>
            </nav>
        </div>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer class="app-footer">
        <div class="container">
            <small>Built by <a href="https://github.com/digadop-ai">Digadop AI</a> · local · loopback only</small>
        </div>
    </footer>
    {% block scripts %}{% endblock %}
    <script src="{{ url_for('static', path='/app.js') }}?v={{ asset_version }}"></script>
</body>
</html>
